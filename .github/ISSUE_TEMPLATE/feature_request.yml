name: 功能建议
description: 提出一个新功能或改进建议
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请描述你的需求，帮助我们理解使用场景。

  - type: textarea
    id: problem
    attributes:
      label: 问题 / 动机
      description: 你遇到了什么问题？或者想要改进什么？
      placeholder: "当我尝试 ... 的时候，发现 ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      description: 你期望的解决方案是什么？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过其他方案吗？

  - type: dropdown
    id: scope
    attributes:
      label: 影响范围
      options:
        - 框架核心 (core/)
        - CLI 命令
        - 工作流定义 (YAML)
        - 插件系统
        - 文档
        - 其他
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: 参与意愿
      options:
        - label: 我愿意提交 PR 来实现这个功能
