name: 功能建议 / Feature Request
description: 提出一个新功能或改进建议 / Propose a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请描述你的需求，帮助我们理解使用场景。
        Thanks for your suggestion! Please describe your use case so we can understand the scenario.

  - type: textarea
    id: problem
    attributes:
      label: 问题 / 动机 / Problem / Motivation
      description: |
        你遇到了什么问题？或者想要改进什么？
        What problem did you encounter? Or what would you like to improve?
      placeholder: "当我尝试 ... 的时候，发现 ... / When I tried to ..., I found ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望方案 / Proposed Solution
      description: |
        你期望的解决方案是什么？
        What solution would you like?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案 / Alternatives Considered
      description: |
        你考虑过其他方案吗？
        Have you considered any alternative approaches?

  - type: dropdown
    id: scope
    attributes:
      label: 影响范围 / Scope
      options:
        - 框架核心 (core/) / Framework Core (core/)
        - CLI 命令 / CLI Commands
        - 工作流定义 (YAML) / Workflow Definition (YAML)
        - 插件系统 / Plugin System
        - 文档 / Documentation
        - 其他 / Other
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: 参与意愿 / Willingness to Contribute
      options:
        - label: 我愿意提交 PR 来实现这个功能 / I'm willing to submit a PR to implement this feature
