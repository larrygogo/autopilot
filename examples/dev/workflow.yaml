name: dev
description: "[AI] 完整开发流程（设计 → 评审 → 开发 → 代码审查 → PR）"
setup_func: setup_dev_task

phases:
  - name: design
    timeout: 900

  - name: review
    timeout: 900
    reject: design
    max_rejections: 10

  - name: develop
    timeout: 1800

  - name: code_review
    timeout: 1200
    reject: develop
    max_rejections: 10

  - name: submit_pr
    timeout: 300
