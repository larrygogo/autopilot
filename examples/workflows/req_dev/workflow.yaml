name: req_dev
description: "需求驱动开发流程（P1：design → review → develop → code_review → submit_pr）；await_review/fix_revision 在 P3 加入"
setup_func: setup_req_dev_task

agents:
  - name: architect
    provider: anthropic
    model: claude-sonnet-4-6
    permission_mode: bypassPermissions
  - name: developer
    provider: anthropic
    model: claude-opus-4-6
    permission_mode: bypassPermissions
  - name: reviewer
    provider: anthropic
    model: claude-sonnet-4-6
    permission_mode: bypassPermissions

phases:
  - name: design
    agent: architect
    timeout: 900
  - name: review
    agent: reviewer
    timeout: 900
    reject: design
    max_rejections: 10
  - name: develop
    agent: developer
    timeout: 1800
  - name: code_review
    agent: reviewer
    timeout: 1200
    reject: develop
    max_rejections: 10
  - name: submit_pr
    timeout: 300
  # await_review：长挂起态，靠外部 trigger 推进
  # - revision_request: reviewer 反馈到达 → 跳到 fix_revision
  # - 直接 forceTransition 到 done（gh poller 在 P4 实现）
  - name: await_review
    timeout: 2592000
    jump_trigger: revision_request
    jump_target: fix_revision

  # fix_revision：独立阶段，agent 读 feedback + checkout PR 分支 + 修复 + push
  # 完成后 jump 回 await_review 等下一轮
  - name: fix_revision
    agent: developer
    timeout: 1800
    jump_trigger: fix_done
    jump_target: await_review
    max_rejections: 30
