name: data_pipeline
description: "数据处理流水线 / Data processing pipeline"

# 重试策略 / Retry policy
retry_policy:
  # 最大重试次数 / Maximum retries
  max_retries: 5
  # 退避策略 / Backoff strategy
  backoff: exponential
  # 初始延迟（秒）/ Initial delay in seconds
  delay: 30

# 终态列表 / Terminal states
terminal_states: [completed, completed_partial, cancelled]

phases:
  # 数据抽取阶段 / Data extraction phase
  - name: extract
    timeout: 600

  # 数据校验阶段 / Data validation phase
  - name: validate_data
    timeout: 300

  # 数据转换阶段 / Data transformation phase
  - name: transform
    timeout: 900
    reject: extract

  # 数据加载阶段 / Data loading phase
  - name: load
    timeout: 600

# 手写转换表：支持前向跳转（validate_skip → load）和多终态
# Custom transition table: supports forward jump (validate_skip → load) and multiple terminal states
transitions:
  pending_extract:
    - [start_extract, running_extract]
    - [cancel, cancelled]
  running_extract:
    - [extract_complete, pending_validate_data]
    - [extract_fail, pending_extract]
    - [cancel, cancelled]
  pending_validate_data:
    - [start_validate_data, running_validate_data]
    - [cancel, cancelled]
  running_validate_data:
    - [validate_data_complete, pending_transform]
    # 前向跳转：跳过 transform 直接到 load / Forward jump: skip transform, go directly to load
    - [validate_skip, pending_load]
    - [validate_data_fail, pending_validate_data]
    - [cancel, cancelled]
  pending_transform:
    - [start_transform, running_transform]
    - [cancel, cancelled]
  running_transform:
    - [transform_complete, pending_load]
    # 驳回：回退到 extract / Reject: fall back to extract
    - [transform_reject, transform_rejected]
    - [transform_fail, pending_transform]
    - [cancel, cancelled]
  transform_rejected:
    # 重试：从 extract 重新开始 / Retry: restart from extract
    - [retry_extract, pending_extract]
    - [cancel, cancelled]
  pending_load:
    - [start_load, running_load]
    - [cancel, cancelled]
  running_load:
    # 完全成功 / Fully completed
    - [load_complete, completed]
    # 部分完成 / Partially completed
    - [load_partial, completed_partial]
    - [load_fail, pending_load]
    - [cancel, cancelled]
