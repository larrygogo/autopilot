# openclaw-dev-workflow 配置模板
# 复制为 config.yaml 并填写实际值

# 工作区路径（默认 ~/.openclaw/workspace）
# workspace: ~/.openclaw/workspace

# ReqGenie 配置
reqgenie:
  base_url: https://your-reqgenie-instance.com
  # 1Password 条目名（用于获取 API Key）
  op_item: reqgenie 需求系统
  op_vault: openclaw

# 通知配置
notify:
  channel: telegram       # telegram | discord | slack 等
  target: "your_chat_id"  # Telegram chat id 或 Discord channel id

# Agent 默认分配
agents:
  default:
    plan_design: claude   # 方案设计
    plan_review: codex    # 方案评审
    development: claude   # 开发
    code_review: codex    # 代码审查

# 项目配置
projects:
  my-project:
    repo_path: ~/repos/my-project
    tech_stack: "描述技术栈，会传给 agent"
  another-project:
    repo_path: ~/repos/another-project
    tech_stack: "Go + React + PostgreSQL"
