# autopilot 框架配置
#
# 配置文件查找优先级：
#   1. 环境变量 DEV_WORKFLOW_CONFIG 指定的路径
#   2. AUTOPILOT_HOME/config.yaml（默认 ~/.autopilot/config.yaml）
#   3. 当前工作目录的 config.yaml
#   4. 项目目录的 config.yaml
#
# 框架仅使用 default_branch，其余字段由工作流自行读取。
# 工作流专属配置详见 examples/ 下各工作流的 config.example.yaml。

# Git 主分支名（默认 main）
# default_branch: main
