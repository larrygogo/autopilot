# dev-pilot 框架配置（全部可选，有默认值）
#
# 配置文件查找优先级：
#   1. 环境变量 DEV_WORKFLOW_CONFIG 指定的路径
#   2. 当前工作目录的 config.yaml
#   3. ~/.openclaw/dev-workflow/config.yaml
#   4. 项目目录的 config.yaml

# 运行时数据存放路径（默认 ~/.openclaw/workspace）
# workspace: ~/.openclaw/workspace

# Git 主分支名（默认 main）
# default_branch: main

# 以下配置由具体工作流使用，详见 examples/ 下各工作流的 config.example.yaml：
# - reqgenie: 需求管理系统集成
# - notify: 通知渠道
# - timeouts: 各阶段超时
# - agents: AI agent 分配
# - projects: 项目映射
