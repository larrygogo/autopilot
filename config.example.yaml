# autopilot 框架配置（全部可选，有默认值）
#
# 配置文件查找优先级：
#   1. 环境变量 DEV_WORKFLOW_CONFIG 指定的路径
#   2. AUTOPILOT_HOME/config.yaml（默认 ~/.autopilot/config.yaml）
#   3. 当前工作目录的 config.yaml
#   4. 项目目录的 config.yaml
#
# 用户工作空间路径（通过环境变量 AUTOPILOT_HOME 设置，默认 ~/.autopilot/）
# 目录结构：
#   ~/.autopilot/
#   ├── config.yaml        # 本配置文件
#   ├── workflows/         # 用户自定义工作流
#   ├── prompts/           # 用户提示词模板
#   └── runtime/
#       └── workflow.db    # SQLite 数据库

# Git 主分支名（默认 main）
# default_branch: main

# 通知后端在各工作流的 WORKFLOW['notify_backends'] 中定义，详见 examples/ 下的示例。
# config.yaml 中的 notify.channel / notify.target 仅作为模板变量数据来源。

# 以下配置由具体工作流使用，详见 examples/ 下各工作流的 config.example.yaml：
# - reqgenie: 需求管理系统集成
# - notify: 通知渠道（channel/target 作为模板变量数据来源）
# - timeouts: 各阶段超时
# - agents: AI agent 分配
# - projects: 项目映射
